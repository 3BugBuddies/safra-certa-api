spring:
  application:
    name: safracerta-api
  datasource:
    url: ${ORACLE_URL:jdbc:oracle:thin:@localhost:1521/XEPDB1}
    username: ${ORACLE_USER:safra}
    password: ${ORACLE_PASSWORD:safra123}
    driver-class-name: oracle.jdbc.OracleDriver
  jpa:
    hibernate:
      ddl-auto: create   # recria o schema a cada boot (facilita testes — trocar p/ update/validate depois)
    database-platform: org.hibernate.dialect.OracleDialect
    show-sql: false
