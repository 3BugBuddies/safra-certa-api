spring.application.name=safracerta-api
# cors e aplicacao
safracerta.cors.allowed-origins=*
server.port=8080

# banco e hikari
spring.datasource.url=${ORACLE_URL}
spring.datasource.username=${ORACLE_USER}
spring.datasource.password=${ORACLE_PASSWORD}
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1

# update: cria/atualiza o schema entre boots sem dropar dados (trocar p/ validate em prod estável)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# spring-ai
spring.ai.openai.base-url=https://generativelanguage.googleapis.com/v1beta/openai
spring.ai.openai.api-key=${GEMINI_API_KEY:}
spring.ai.openai.chat.options.model=gemini-2.5-flash
spring.ai.openai.chat.options.temperature=0.2
spring.ai.retry.max-attempts=3
spring.ai.retry.backoff.initial-interval=2000
spring.ai.retry.backoff.multiplier=2
spring.ai.retry.backoff.max-interval=10000
spring.ai.retry.on-client-errors=false

# open-meteo
safracerta.open-meteo.base-url=https://api.open-meteo.com/v1/forecast
safracerta.open-meteo.throttle-horas=24

# swagger
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

