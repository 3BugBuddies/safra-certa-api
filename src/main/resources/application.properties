spring.application.name=safracerta-api

# Datasource Oracle (FIAP). Sobrescrever via ORACLE_URL/ORACLE_USER/ORACLE_PASSWORD no deploy.
spring.datasource.url=${ORACLE_URL}
spring.datasource.username=${ORACLE_USER}
spring.datasource.password=${ORACLE_PASSWORD}
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1

# update: cria/atualiza o schema entre boots sem dropar dados (trocar p/ validate em prod estável)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.OracleDialect
spring.jpa.show-sql=false

# Spring AI — Gemini via endpoint OpenAI-compatible (gemini-2.5-flash). GEMINI_API_KEY = secret de ambiente.
spring.ai.openai.base-url=https://generativelanguage.googleapis.com/v1beta/openai
spring.ai.openai.api-key=${GEMINI_API_KEY:}
spring.ai.openai.chat.options.model=gemini-2.5-flash
spring.ai.openai.chat.options.temperature=0.2
spring.ai.retry.max-attempts=3
spring.ai.retry.backoff.initial-interval=2000
spring.ai.retry.backoff.multiplier=2
spring.ai.retry.backoff.max-interval=10000
spring.ai.retry.on-client-errors=false

# Integração Open-Meteo + throttle da coleta de previsão (só consulta se a última for mais antiga que isto, em horas).
# 24h = ~1 previsão/dia por talhão: a Open-Meteo devolve agregado diário (D+1), refazer dentro do dia é redundante.
safracerta.open-meteo.base-url=https://api.open-meteo.com/v1/forecast
safracerta.open-meteo.throttle-horas=24

# CORS provisório; restringir ao domínio do front no deploy final.
safracerta.cors.allowed-origins=*

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

server.port=8080
